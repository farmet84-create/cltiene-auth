version: '3.9'

services:
  app:
    build: .
    container_name: cltiene-auth
    ports:
      - "3000:3000"
    env_file:
      - .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/api/health', r => { if(r.statusCode!==200) throw r.statusCode })"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  default:
    name: cltiene-net
